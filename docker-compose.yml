# docker-compose.yml (versi lengkap)

services:

  # ── SERVICE 1: Web Application ──
  app:
    build: ./app
    container_name: siakad_app
    ports:
      - "${APP_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
    networks:
      - siakad_network
    restart: unless-stopped

  # ── SERVICE 2: PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: siakad_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - siakad_network
    restart: unless-stopped

  # ── SERVICE 3: MinIO Object Storage ──
  minio:
    image: minio/minio:latest
    container_name: siakad_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO Console (web UI)
    volumes:
      - minio_data:/data
    networks:
      - siakad_network
    restart: unless-stopped

  # ── SERVICE 4: Adminer (GUI Database) ──
  adminer:
    image: adminer:latest
    container_name: siakad_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - siakad_network
    restart: unless-stopped

# ── VOLUMES: Persistensi Data ──
volumes:
  postgres_data:
  minio_data:

# ── NETWORK: Komunikasi Antar Container ──
networks:
  siakad_network:
    driver: bridge
