# docker-compose.yml

services:

  # ── SERVICE 1: Web Application ──
  app:
    build: ./app
    container_name: siakad_app
    ports:
      - "${APP_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - siakad_network
    restart: unless-stopped

  # ── SERVICE 2: PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: siakad_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - siakad_network
    restart: unless-stopped

# ── VOLUMES: Persistensi Data ──
volumes:
  postgres_data:

# ── NETWORK: Komunikasi Antar Container ──
networks:
  siakad_network:
    driver: bridge



